<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fresh Catch — Admin</title>
<style>
  :root{--sea:#0a6ebd;--sea-deep:#064b80;--foam:#e9f6ff;--ink:#08324f;--ok:#1aa86b;--line:#d6e7f3}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--foam);color:var(--ink);line-height:1.5;padding:20px}
  .wrap{max-width:720px;margin:0 auto}
  h1{color:var(--sea-deep);font-size:1.6rem;margin-bottom:6px}
  .sub{color:#5a7891;font-size:.9rem;margin-bottom:18px}
  .lock{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:18px}
  .lock input{width:100%;border:1px solid var(--line);border-radius:8px;padding:11px;font-size:1rem;margin:8px 0}
  button{padding:11px 16px;border:none;border-radius:8px;background:var(--sea);color:#fff;font-weight:700;cursor:pointer;font-size:.95rem}
  .panel{display:none}
  .row{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;flex-wrap:wrap}
  .row .nm{font-weight:700;min-width:150px}
  .row .tl{color:#5a7891;font-size:.85rem;min-width:110px}
  .row input.nm-in{font-weight:700;min-width:150px;border:1px solid var(--line);border-radius:8px;padding:8px;font-size:.95rem}
  .row input.tl-in{color:#5a7891;font-size:.85rem;min-width:110px;border:1px solid var(--line);border-radius:8px;padding:8px}
  .row input.price{width:110px;border:1px solid var(--line);border-radius:8px;padding:8px;font-size:1rem}
  .row .emoji{font-size:1.6rem}
  .row.out{opacity:.6;border-color:#e23b3b}
  .row .rm{margin-left:auto;background:#e23b3b}
  .switch{position:relative;display:inline-block;width:52px;height:30px;flex-shrink:0}
  .switch input{opacity:0;width:0;height:0}
  .slider{position:absolute;cursor:pointer;inset:0;background:#cbd6df;border-radius:999px;transition:.2s}
  .slider:before{content:"";position:absolute;height:22px;width:22px;left:4px;bottom:4px;background:#fff;border-radius:50%;transition:.2s}
  input:checked + .slider{background:var(--ok)}
  input:checked + .slider:before{transform:translateX(22px)}
  .add{background:#fff;border:1px dashed var(--sea);border-radius:12px;padding:14px;margin:14px 0;display:grid;grid-template-columns:auto 1fr 1fr 120px auto;gap:10px;align-items:center}
  .add input{border:1px solid var(--line);border-radius:8px;padding:9px;font-size:.95rem}
  .add .emoji-in{width:60px}
  .savebar{display:flex;gap:12px;align-items:center;margin-top:6px}
  .savebar .save{background:var(--ok);font-size:1.05rem;padding:13px 22px}
  .status{font-size:.95rem;color:var(--sea-deep);min-height:1.2em}
  @media(max-width:640px){.add{grid-template-columns:1fr 1fr}.add .emoji-in{width:100%}.row .nm{min-width:100%}}
</style>
</head>
<body>
<div class="wrap">
  <h1>Fresh Catch — Admin</h1>
  <div class="sub">Edit prices, mark sold out, add or remove products. Changes apply live.</div>

  <div class="lock" id="lock">
    <label for="code">Admin passcode</label>
    <input id="code" type="password" placeholder="Enter passcode" />
    <button onclick="unlock()">Unlock</button>
    <div class="status" id="lockStatus"></div>
  </div>

  <div class="panel" id="panel">
    <div id="list"></div>

    <div class="add">
      <input class="emoji-in" id="a-emoji" placeholder="🐟" maxlength="4" />
      <input id="a-name" placeholder="Product name (EN)" />
      <input id="a-tamil" placeholder="Tamil name" />
      <input id="a-price" type="number" min="0" placeholder="₹/kg" />
      <button onclick="addProduct()">+ Add</button>
    </div>

    <div class="savebar">
      <button class="save" onclick="save()">💾 Save changes</button>
      <span class="status" id="status"></span>
    </div>
    <p style="margin-top:14px;font-size:.85rem;color:#5a7891">Tip: passcode is Netlify env var <code>ADMIN_CODE</code> (default: freshcatch2026).</p>
  </div>
</div>

<script>
  let CATALOG = [];
  let CODE = "";

  function unlock(){
    CODE = document.getElementById("code").value.trim();
    if(!CODE){ document.getElementById("lockStatus").textContent = "Enter the passcode."; return; }
    fetch("/api/catalog").then(r => r.json()).then(data => {
      CATALOG = Array.isArray(data) ? data : [];
      document.getElementById("lock").style.display = "none";
      document.getElementById("panel").style.display = "block";
      renderList();
    }).catch(() => { document.getElementById("lockStatus").textContent = "Network error."; });
  }

  function renderList(){
    const list = document.getElementById("list");
    list.innerHTML = "";
    CATALOG.forEach((p, i) => {
      const row = document.createElement("div");
      row.className = "row" + (p.soldOut ? " out" : "");
      row.innerHTML = `
        <span class="emoji">${p.emoji || "🐟"}</span>
        <input class="nm-in" value="${p.name.replace(/"/g,"&quot;")}" oninput="CATALOG[${i}].name = this.value" />
        <input class="tl-in" value="${(p.tamil||"").replace(/"/g,"&quot;")}" oninput="CATALOG[${i}].tamil = this.value" />
        <input class="price" type="number" min="0" value="${p.price}" oninput="CATALOG[${i}].price = Number(this.value)||0" />
        <label class="switch">
          <input type="checkbox" ${p.soldOut ? "checked" : ""} onchange="CATALOG[${i}].soldOut = this.checked; this.closest('.row').classList.toggle('out', this.checked)">
          <span class="slider"></span>
        </label>
        <button class="rm" onclick="removeProduct(${i})">🗑</button>`;
      list.appendChild(row);
    });
  }

  function addProduct(){
    const emoji = document.getElementById("a-emoji").value.trim() || "🐟";
    const name = document.getElementById("a-name").value.trim();
    const tamil = document.getElementById("a-tamil").value.trim();
    const price = Number(document.getElementById("a-price").value) || 0;
    if(!name){ alert("Product name is required."); return; }
    CATALOG.push({ emoji, name, tamil, price, soldOut:false });
    document.getElementById("a-emoji").value="";
    document.getElementById("a-name").value="";
    document.getElementById("a-tamil").value="";
    document.getElementById("a-price").value="";
    renderList();
  }

  function removeProduct(i){
    CATALOG.splice(i, 1);
    renderList();
  }

  async function save(){
    document.getElementById("status").textContent = "Saving…";
    try {
      const res = await fetch("/api/catalog?code=" + encodeURIComponent(CODE), {
        method:"POST",
        headers:{ "content-type":"application/json" },
        body: JSON.stringify(CATALOG)
      });
      if(res.status === 401){ throw new Error("wrong passcode"); }
      if(!res.ok){ throw new Error("server save failed"); }
      document.getElementById("status").textContent = "Saved ✓ Changes are live.";
    } catch(e){
      document.getElementById("status").textContent = "Failed: " + e.message + ". Check passcode or redeploy.";
    }
  }
</script>
</body>
</html>
